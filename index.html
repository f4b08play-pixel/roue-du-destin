<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Roue du Destin de Morgane💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #1a0010 0%, #3d0025 50%, #1a0010 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
    padding-bottom: 40px;
  }

  .title {
    font-family: 'Pacifico', cursive;
    color: #FFD700;
    font-size: 1.8rem;
    text-align: center;
    margin-top: 28px;
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(255,180,0,0.6);
    letter-spacing: 1px;
  }
  .subtitle {
    color: #ffb3cc;
    font-size: 0.95rem;
    text-align: center;
    margin-bottom: 22px;
    opacity: 0.85;
  }

  /* WHEEL CONTAINER */
  .wheel-wrap {
    position: relative;
    width: 310px;
    height: 310px;
    margin: 0 auto;
  }

  #wheelCanvas {
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,100,150,0.35), 0 0 80px rgba(255,50,100,0.15);
    display: block;
  }

  /* POINTER */
  .pointer {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 34px solid #FFD700;
    filter: drop-shadow(0 2px 6px rgba(255,200,0,0.7));
    z-index: 10;
  }

  /* SPIN BUTTON */
  .spin-btn {
    display: block;
    margin: 28px auto 0;
    background: linear-gradient(135deg, #ff3d7f, #ff6fa3);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.25rem;
    font-weight: 900;
    padding: 15px 50px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,60,120,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
  }
  .spin-btn:active { transform: scale(0.96); box-shadow: 0 3px 12px rgba(255,60,120,0.4); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* RESULT BANNER */
  .result-banner {
    display: none;
    text-align: center;
    margin-top: 22px;
    animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
  }
  .result-banner.show { display: block; }
  .result-banner p {
    font-size: 1.1rem;
    color: #ffb3cc;
    margin-bottom: 10px;
    font-weight: 700;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* SCRATCH CARD */
  .scratch-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 26px;
    animation: popIn 0.5s cubic-bezier(.175,.885,.32,1.275);
  }
  .scratch-wrap.show { display: flex; }
  .scratch-label {
    color: #FFD700;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
    text-align: center;
  }

  .scratch-card {
    position: relative;
    width: 280px;
    height: 140px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .scratch-reveal {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #fff0f5, #ffe0ee);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 18px;
  }
  .scratch-reveal .massage-icon {
    font-size: 2.6rem;
    margin-bottom: 6px;
  }
  .scratch-reveal .massage-text {
    font-family: 'Pacifico', cursive;
    font-size: 1.1rem;
    color: #c0005a;
    text-align: center;
    padding: 0 16px;
    line-height: 1.4;
  }

  #scratchCanvas {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    cursor: crosshair;
    touch-action: none;
  }

  .scratch-hint {
    color: #ffb3cc;
    font-size: 0.82rem;
    margin-top: 8px;
    opacity: 0.8;
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* REPLAY */
  .replay-btn {
    display: none;
    margin: 18px auto 0;
    background: transparent;
    border: 2px solid #FFD700;
    color: #FFD700;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 10px 36px;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .replay-btn.show { display: block; }
  .replay-btn:hover { background: rgba(255,215,0,0.15); }
</style>
</head>
<body>

<div class="title">🎡 Roue du Destin de Morgane</div>
<div class="subtitle">Tourne et découvre ton sort… 💕</div>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <canvas id="wheelCanvas" width="310" height="310"></canvas>
</div>

<button class="spin-btn" id="spinBtn" onclick="spinWheel()">TOURNER 🎰</button>

<div class="result-banner" id="resultBanner">
  <p id="resultText"></p>
</div>

<div class="scratch-wrap" id="scratchWrap">
  <div class="scratch-label">✨ Gratte pour découvrir ta récompense !</div>
  <div class="scratch-card">
    <div class="scratch-reveal">
      <div class="massage-icon">📸🍒</div>
      <div class="massage-text"Envoi une photo de tes seins</div>
    </div>
    <canvas id="scratchCanvas" width="280" height="140"></canvas>
  </div>
  <div class="scratch-hint">👆 Gratte avec le doigt</div>
</div>

<button class="replay-btn" id="replayBtn" onclick="resetGame()">🔄 Rejouer</button>

<div class="confetti-container" id="confettiContainer"></div>

<script>
// ─── WHEEL SEGMENTS ───────────────────────────────────────────
// Truquée : grande part "Obtient un message" (8 segments), petite "Récompense" (1 segment très visible)
// On définit les arcs en degrés

const segments = [
  { label: "Massage 💆", color: "#c0005a", textColor: "#fff", weight: 6 },
  { label: "Bisou 💋", color: "#a0004a", textColor: "#fff", weight: 6 },
  { label: "Récompense\nton homme 💕", color: "#FFD700", textColor: "#3d0025", weight: 1, isWinner: true },
  { label: "Resto' 🍝", color: "#c0005a", textColor: "#fff", weight: 6 },
  { label: "Massage 💆", color: "#a0004a", textColor: "#fff", weight: 6 },
  { label: "Bisou 💋", color: "#c0005a", textColor: "#fff", weight: 6 },
  { label: "Massage 💆", color: "#a0004a", textColor: "#fff", weight: 6 },
  { label: "Bisou 💋", color: "#c0005a", textColor: "#fff", weight: 6 },
];

const totalWeight = segments.reduce((s, seg) => s + seg.weight, 0);

// Build arc list
let arcs = [];
let cumulative = 0;
for (let seg of segments) {
  const startAngle = (cumulative / totalWeight) * 2 * Math.PI;
  cumulative += seg.weight;
  const endAngle = (cumulative / totalWeight) * 2 * Math.PI;
  arcs.push({ ...seg, startAngle, endAngle });
}

// ─── DRAW WHEEL ───────────────────────────────────────────────
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const cx = canvas.width / 2;
const cy = canvas.height / 2;
const R = cx - 6;

function drawWheel(rotation) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Outer glow ring
  const gradient = ctx.createRadialGradient(cx, cy, R - 4, cx, cy, R + 6);
  gradient.addColorStop(0, 'rgba(255,200,80,0.8)');
  gradient.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R + 4, 0, 2 * Math.PI);
  ctx.fillStyle = gradient;
  ctx.fill();

  // Segments
  for (let arc of arcs) {
    const start = arc.startAngle + rotation;
    const end = arc.endAngle + rotation;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();
    ctx.fillStyle = arc.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Text
    ctx.save();
    const midAngle = (start + end) / 2;
   ctx.translate(cx, cy);
ctx.rotate(midAngle);
ctx.textAlign = 'center';      // Centre horizontalement par rapport au point d'ancrage
ctx.textBaseline = 'middle';   // Centre verticalement par rapport au point d'ancrage
ctx.fillStyle = arc.textColor;

const arcSpan = end - start;
const fontSize = arcSpan > 0.6 ? 13 : arcSpan > 0.35 ? 11 : 9;
ctx.font = `bold ${fontSize}px Nunito, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;

const lines = arc.label.split('\n');
const lineH = fontSize * 1.3;

// Calcul de la position de départ pour que tout le bloc de texte soit centré
const totalH = lines.length * lineH;

// Position X : on place le texte au milieu du rayon de la roue (R / 2)
const textX = R * 0.55; 

lines.forEach((line, i) => {
  // Calcul de la hauteur de chaque ligne pour un centrage vertical parfait
  const textY = -totalH / 2 + (i * lineH) + (lineH / 2);
  ctx.fillText(line, textX, textY);
});
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 24, 0, 2 * Math.PI);
  const cg = ctx.createRadialGradient(cx - 4, cy - 4, 2, cx, cy, 24);
  cg.addColorStop(0, '#fff8cc');
  cg.addColorStop(1, '#FFD700');
  ctx.fillStyle = cg;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = '#3d0025';
  ctx.font = 'bold 18px Nunito';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💕', cx, cy);
}

let currentRotation = 0;
drawWheel(currentRotation);

// ─── SPIN LOGIC ───────────────────────────────────────────────
// The pointer is at the TOP (−π/2). We want to land on the winner arc.
// Winner is arcs[2]. We calculate the exact angle to land at its center.

let spinning = false;

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultBanner').classList.remove('show');
  document.getElementById('scratchWrap').classList.remove('show');
  document.getElementById('replayBtn').classList.remove('show');

  const winner = arcs.find(a => a.isWinner);
  const winnerMid = (winner.startAngle + winner.endAngle) / 2;

  // Pointer at top = -π/2. We want winnerMid + rotation ≡ -π/2 (mod 2π)
  // So rotation = -π/2 - winnerMid + 2π*k
  // Add random flair: 5 to 8 full spins + tiny random offset within winner arc
  const jitter = (Math.random() - 0.5) * (winner.endAngle - winner.startAngle) * 0.4;
  const targetAngle = -Math.PI / 2 - (winnerMid + jitter);
  const fullSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const finalRotation = targetAngle + fullSpins;

  const duration = 4500 + Math.random() * 800;
  const startTime = performance.now();
  const startRotation = currentRotation;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeOut(t);
    currentRotation = startRotation + (finalRotation - startRotation) * eased;
    drawWheel(currentRotation);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentRotation = finalRotation;
      drawWheel(currentRotation);
      spinning = false;
      onSpinEnd(winner);
    }
  }

  requestAnimationFrame(animate);
}

function onSpinEnd(winner) {
  if (winner.isWinner) {
    // Show scratch card
    document.getElementById('scratchWrap').classList.add('show');
    initScratch();
    launchConfetti();
  } else {
    document.getElementById('resultBanner').classList.add('show');
    document.getElementById('resultText').textContent = '📩 Regarde ton message !';
    document.getElementById('replayBtn').classList.add('show');
  }
}

// ─── SCRATCH CARD ─────────────────────────────────────────────
function initScratch() {
  const sc = document.getElementById('scratchCanvas');
  const sctx = sc.getContext('2d');

  // Fill with silver scratch surface
  const grad = sctx.createLinearGradient(0, 0, sc.width, sc.height);
  grad.addColorStop(0, '#b8bfc9');
  grad.addColorStop(0.4, '#d8dde6');
  grad.addColorStop(0.6, '#c2c9d4');
  grad.addColorStop(1, '#a8afba');
  sctx.fillStyle = grad;
  sctx.fillRect(0, 0, sc.width, sc.height);

  // Texture dots
  for (let i = 0; i < 300; i++) {
    sctx.beginPath();
    sctx.arc(Math.random() * sc.width, Math.random() * sc.height, Math.random() * 1.5, 0, 2 * Math.PI);
    sctx.fillStyle = `rgba(${Math.random() > 0.5 ? 255 : 150},${Math.random() > 0.5 ? 255 : 150},255,0.08)`;
    sctx.fill();
  }

  // Label
  sctx.fillStyle = '#7a8290';
  sctx.font = 'bold 14px Nunito, sans-serif';
  sctx.textAlign = 'center';
  sctx.textBaseline = 'middle';
  sctx.fillText('✨ GRATTE ICI ✨', sc.width / 2, sc.height / 2);

  sctx.globalCompositeOperation = 'destination-out';

  let isDrawing = false;
  let revealed = false;
  let scratchedPixels = 0;

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY
    };
  }

  function scratch(pos) {
    sctx.beginPath();
    sctx.arc(pos.x, pos.y, 22, 0, 2 * Math.PI);
    sctx.fill();
    if (!revealed) checkReveal();
  }

  function checkReveal() {
    const data = sctx.getImageData(0, 0, sc.width, sc.height).data;
    let transparent = 0;
    for (let i = 3; i < data.length; i += 4) {
      if (data[i] < 128) transparent++;
    }
    const pct = transparent / (sc.width * sc.height);
    if (pct > 0.45) {
      revealed = true;
      sctx.clearRect(0, 0, sc.width, sc.height);
      document.getElementById('replayBtn').classList.add('show');
    }
  }

  sc.addEventListener('mousedown', e => { isDrawing = true; scratch(getPos(e, sc)); });
  sc.addEventListener('mousemove', e => { if (isDrawing) scratch(getPos(e, sc)); });
  sc.addEventListener('mouseup', () => isDrawing = false);
  sc.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; scratch(getPos(e, sc)); }, { passive: false });
  sc.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing) scratch(getPos(e, sc)); }, { passive: false });
  sc.addEventListener('touchend', () => isDrawing = false);
}

// ─── CONFETTI ─────────────────────────────────────────────────
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#FFD700', '#ff3d7f', '#fff', '#ff9ac1', '#c0005a', '#ffe0a0'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const dur = 2 + Math.random() * 2.5;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), (dur + 1) * 1000);
  }
}

// ─── RESET ────────────────────────────────────────────────────
function resetGame() {
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('resultBanner').classList.remove('show');
  document.getElementById('scratchWrap').classList.remove('show');
  document.getElementById('replayBtn').classList.remove('show');

  // Reset scratch canvas
  const sc = document.getElementById('scratchCanvas');
  const sctx = sc.getContext('2d');
  sctx.globalCompositeOperation = 'source-over';
  sctx.clearRect(0, 0, sc.width, sc.height);
}
</script>
</body>
</html>
